version: "3.8"

services:
  schumacher-web:
    image: nginx:alpine
    networks:
      - schumacher
    volumes:
      - /var/www/schumacher/web/current:/usr/share/nginx/html:ro
      - /var/www/schumacher/repo/infra/swarm/nginx-spa.conf:/etc/nginx/conf.d/default.conf:ro
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      labels:
        - traefik.enable=true
        - traefik.docker.network=schumacher
        - traefik.http.routers.schumacher-web.rule=Host(`schumachertursc.com.br`) || Host(`www.schumachertursc.com.br`)
        - traefik.http.routers.schumacher-web.entrypoints=websecure
        - traefik.http.routers.schumacher-web.tls.certresolver=letsencryptresolver
        - traefik.http.services.schumacher-web.loadbalancer.server.port=80

  schumacher-app:
    image: nginx:alpine
    networks:
      - schumacher
    volumes:
      - /var/www/schumacher/app/current:/usr/share/nginx/html:ro
      - /var/www/schumacher/repo/infra/swarm/nginx-spa.conf:/etc/nginx/conf.d/default.conf:ro
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      labels:
        - traefik.enable=true
        - traefik.docker.network=schumacher
        - traefik.http.routers.schumacher-app.rule=Host(`app.schumachertursc.com.br`)
        - traefik.http.routers.schumacher-app.entrypoints=websecure
        - traefik.http.routers.schumacher-app.tls.certresolver=letsencryptresolver
        - traefik.http.services.schumacher-app.loadbalancer.server.port=80

networks:
  schumacher:
    external: true
