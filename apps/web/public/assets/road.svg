<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" preserveAspectRatio="none">
  <!-- Road gradient -->
  <defs>
    <linearGradient id="roadGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a4a4a"/>
      <stop offset="100%" style="stop-color:#2a2a2a"/>
    </linearGradient>
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB"/>
      <stop offset="100%" style="stop-color:#E0F4FF"/>
    </linearGradient>
  </defs>
  
  <!-- Sky -->
  <rect x="0" y="0" width="1200" height="200" fill="url(#skyGradient)"/>
  
  <!-- Horizon hills -->
  <ellipse cx="200" cy="200" rx="250" ry="80" fill="#6B8E23"/>
  <ellipse cx="500" cy="200" rx="300" ry="100" fill="#7CB342"/>
  <ellipse cx="900" cy="200" rx="400" ry="90" fill="#558B2F"/>
  
  <!-- Road perspective -->
  <polygon points="450,400 750,400 650,200 550,200" fill="url(#roadGradient)"/>
  
  <!-- Road markings (dashed center line) -->
  <line x1="600" y1="210" x2="600" y2="230" stroke="#FFD700" stroke-width="4"/>
  <line x1="600" y1="250" x2="600" y2="280" stroke="#FFD700" stroke-width="5"/>
  <line x1="600" y1="305" x2="600" y2="345" stroke="#FFD700" stroke-width="6"/>
  <line x1="600" y1="365" x2="600" y2="400" stroke="#FFD700" stroke-width="8"/>
  
  <!-- Road edge lines -->
  <line x1="550" y1="200" x2="450" y2="400" stroke="#FFFFFF" stroke-width="3"/>
  <line x1="650" y1="200" x2="750" y2="400" stroke="#FFFFFF" stroke-width="3"/>
</svg>
